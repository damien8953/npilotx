- name: Push results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 1. 先把自己的變動加入暫存區
          git add atis_${{ matrix.airport }}.txt
          
          # 2. 先在本地提交存檔 (如果沒變動就跳過)
          git commit -m "Auto Update: ${{ matrix.airport }}" || exit 0
          
          # 3. 使用迴圈進行「拉取與推送」，應付多人同時擠進去的情況
          # 嘗試最多 5 次，每次失敗會等 5 秒再試
          for i in {1..5}; do
            echo "Attempt $i: Syncing and Pushing..."
            
            # 先拉取雲端別人的更新，並把自己的 commit 接在後面 (rebase)
            git pull --rebase origin main
            
            # 嘗試推送到 GitHub
            if git push origin main; then
              echo "✅ Successfully pushed ${{ matrix.airport }}"
              exit 0
            fi
            
            echo "⚠️ Push collision detected, retrying in 5s..."
            sleep 5
          done
          
          echo "❌ Failed to push after 5 attempts."
          exit 1
