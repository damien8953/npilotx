name: Hourly ATIS Update

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出代碼
        uses: actions/checkout@v3

      - name: 設定 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安裝套件
        run: pip install requests beautifulsoup4

      - name: 執行抓取程式
        run: python3 main.py # 這裡改用 python3

      - name: 檢查檔案內容 (除錯用)
        run: cat atis_result.txt

      - name: 將結果推回 GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # 關鍵修改：使用萬用字元 * 來加入所有 atis 開頭的 txt 檔案
          git add atis_*.txt
          git commit -m "自動更新機場 ATIS 數據: $(date)" || echo "No changes to commit"
          git push
