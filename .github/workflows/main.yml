name: Parallel ATIS Update

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: 

jobs:
  fetch-atis:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        airport: [
          VHHH, VTBD, VTBS, VVDN, VVNB, 
          RCKH, RCTP, RCMQ, 
          RJAA, RJBB, RJFF, 
          RKPC, RKSI, 
          WMKK, WSSS, 
          ZBAA, ZBAD, ZBTJ, ZBYN, ZGGG, ZGKL, ZGNN, ZGOW, ZGSZ, 
          ZHCC, ZHHH, ZSAM, ZSCG, ZSFZ, ZSHC, ZSNB, ZSOF, ZSPD, 
          ZSQD, ZUCK, ZUGY, ZUUU, ZUTF
        ]

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run Fetcher
        run: python main.py ${{ matrix.airport }}

      - name: Push results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add atis_${{ matrix.airport }}.txt
          git commit -m "Auto Update: ${{ matrix.airport }}" || exit 0
          
          for i in {1..5}; do
            echo "Attempt $i: Syncing and Pushing..."
            git pull --rebase origin main
            if git push origin main; then
              echo "Successfully pushed"
              exit 0
            fi
            sleep 5
          done
