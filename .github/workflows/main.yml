name: Parallel ATIS Update

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: 

# --- 🚀 修正：強制開啟 Node.js 24 以消除所有警告 ---
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch-atis:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        airport: [
          VHHH, VTBD, VTBS, VVDN, VVNB, 
          RCKH, RCTP, RCMQ, 
          RJAA, RJBB, RJFF, 
          RKPC, RKSI, 
          WMKK, WSSS, 
          ZBAA, ZBAD, ZBTJ, ZBYN, ZGGG, ZGKL, ZGNN, ZGOW, ZGSZ, 
          ZHCC, ZHHH, ZSAM, ZSFZ, ZSHC, ZSNB, ZSOF, ZSPD, 
          ZSQD, ZUCK, ZUGY, ZUUU, ZUTF
        ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run Fetcher
        run: python main.py ${{ matrix.airport }}

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: atis-${{ matrix.airport }}
          path: atis_${{ matrix.airport }}.txt
          retention-days: 1

  consolidate:
    needs: fetch-atis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: all-results
          pattern: atis-*
          merge-multiple: true
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Move files and Combine
        run: |
          cp all-results/*.txt .
          python combine.py
          
      - name: Push everything
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add *.txt all_atis.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto Update: Consolidated ATIS Data" && git push origin main)
