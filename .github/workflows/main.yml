name: Hourly ATIS Update

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出代碼
        uses: actions/checkout@v3

      - name: 設定 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安裝套件
        run: pip install requests beautifulsoup4

      - name: 執行抓取程式
        run: python3 main.py # 這裡改用 python3

      - name: 檢查 VHHH 內容 (測試用)
        run: cat atis_VHHH.txt # 改為檢查獨立檔案，而不是舊的總表

      - name: 將結果推回 GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add atis_*.txt
          # 順便把舊的總表刪掉，免得礙眼
          git rm atis_result.txt --ignore-unmatch 
          git commit -m "自動更新 ATIS 數據: $(date)" || echo "No changes to commit"
          git push
