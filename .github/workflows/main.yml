name: Parallel ATIS Update

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: 

jobs:
  fetch-atis:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        airport: [
          VHHH, VTBD, VTBS, VVDN, VVNB, 
          RCKH, RCTP, RCMQ, 
          RJAA, RJBB, RJFF, 
          RKPC, RKSI, 
          WMKK, WSSS, 
          ZBAA, ZBAD, ZBTJ, ZBYN, ZGGG, ZGKL, ZGNN, ZGOW, ZGSZ, 
          ZHCC, ZHHH, ZSAM, ZSFZ, ZSHC, ZSNB, ZSOF, ZSPD, 
          ZSQD, ZUCK, ZUGY, ZUUU, ZUTF
        ]
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      - name: Run Fetcher
        run: python main.py ${{ matrix.airport }}
      # 將抓到的 .txt 檔案暫存到置物櫃
      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: atis-${{ matrix.airport }}
          path: atis_${{ matrix.airport }}.txt

  consolidate:
    needs: fetch-atis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      # 從置物櫃下載所有分身抓到的檔案
      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: all-results
          pattern: atis-*
          merge-multiple: true
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      # 將下載回來的檔案移動到主目錄以便 combine.py 處理
      - name: Move files and Combine
        run: |
          cp all-results/*.txt .
          python combine.py
      # 這裡是整輪任務「唯一」一次的推送
      - name: Push everything
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add *.txt all_atis.json
          git commit -m "Auto Update: Consolidated ATIS Data" || exit 0
          git push origin main
