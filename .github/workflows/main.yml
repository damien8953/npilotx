name: Parallel ATIS Update

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: 

jobs:
  fetch-atis:
    runs-on: ubuntu-latest
    strategy:
      # 重要：即使一個機場失敗，其他機場也要繼續跑
      fail-fast: false 
      matrix:
        # 在這裡填入你公司所有的機場！
        airport: [VHHH, ZSAM, RCKH, RCTP, WSSS, ZGGG, VMMC] 

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run Fetcher
        # 這裡會根據矩陣自動帶入機場代碼
        run: python main.py ${{ matrix.airport }}

      - name: Push results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # 關鍵：因為多個任務同時跑，推送前先 pull 以免衝突
          git pull --rebase origin main
          git add atis_${{ matrix.airport }}.txt
          git commit -m "Auto Update: ${{ matrix.airport }}" || exit 0
          git push origin main
