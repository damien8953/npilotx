name: Parallel ATIS Update

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: 

jobs:
  fetch-atis:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        airport: [
          VHHH, VTBD, VTBS, VVDN, VVNB, 
          RCKH, RCTP, RCMQ, 
          RJAA, RJBB, RJFF, 
          RKPC, RKSI, 
          WMKK, WSSS, 
          ZBAA, ZBAD, ZBTJ, ZBYN, ZGGG, ZGKL, ZGNN, ZGOW, ZGSZ, 
          ZHCC, ZHHH, ZSAM, ZSFZ, ZSHC, ZSNB, ZSOF, ZSPD, 
          ZSQD, ZUCK, ZUGY, ZUUU, ZUTF
        ]
    steps:
      # 升級到 v4
      - name: Checkout
        uses: actions/checkout@v4
        
      # 升級到 v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # 順便用新一點的 Python

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run Fetcher
        run: python main.py ${{ matrix.airport }}

      # upload-artifact v4 其實已經很新，
      # 但我們確保它在最新環境下執行
      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: atis-${{ matrix.airport }}
          path: atis_${{ matrix.airport }}.txt
          retention-days: 1 # 只需要留 1 天，節省空間

  consolidate:
    needs: fetch-atis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: all-results
          pattern: atis-*
          merge-multiple: true
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Move files and Combine
        run: |
          cp all-results/*.txt .
          python combine.py
          
      - name: Push everything
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add *.txt all_atis.json
          git commit -m "Auto Update: Consolidated ATIS Data" || exit 0
          git push origin main
