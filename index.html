<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATIS MONITOR PRO</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #1c1c1e;
            --accent-blue: #0a84ff;
            --accent-green: #32d74b;
            --accent-orange: #ff9f0a;
            --text-main: #ffffff;
            --text-dim: #8e8e93;
            --border-color: #38383a;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        #ptr {
            text-align: center; height: 0; overflow: hidden;
            background: var(--bg-color); color: var(--accent-blue);
            font-size: 13px; line-height: 60px; font-weight: 500;
        }

        header {
            padding: 60px 20px 20px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 100;
            border-bottom: 0.5px solid var(--border-color);
        }

        h1 { margin: 0; font-size: 32px; font-weight: 800; letter-spacing: -0.5px; }
        .status-bar { display: flex; align-items: center; margin-top: 5px; font-size: 13px; color: var(--text-dim); }
        .dot { height: 8px; width: 8px; background-color: var(--accent-green); border-radius: 50%; display: inline-block; margin-right: 6px; box-shadow: 0 0 8px var(--accent-green); }

        .container { padding: 10px 15px; padding-bottom: 100px; }

        .airport-card {
            background: var(--card-bg);
            border-radius: 14px;
            margin-bottom: 10px;
            overflow: hidden;
            border: 0.5px solid var(--border-color);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card-header {
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .icao-box { display: flex; align-items: baseline; gap: 10px; }
        .icao-name { font-size: 22px; font-weight: 700; color: var(--text-main); }
        .time-ago { font-size: 14px; font-weight: 400; color: var(--text-dim); }
        .time-ago.fresh { color: var(--accent-green); }
        .time-ago.stale { color: var(--accent-orange); }

        .chevron {
            width: 12px; height: 12px;
            border-right: 2px solid var(--text-dim);
            border-bottom: 2px solid var(--text-dim);
            transform: rotate(45deg);
            transition: transform 0.3s;
        }

        .card-content {
            max-height: 0;
            padding: 0 20px;
            opacity: 0;
            overflow: hidden;
            transition: all 0.3s ease;
            background: #2c2c2e;
        }

        .expanded .card-content {
            max-height: 1000px;
            padding: 20px;
            opacity: 1;
            border-top: 0.5px solid var(--border-color);
        }

        .expanded .chevron { transform: rotate(-135deg); border-color: var(--accent-blue); }

        .atis-text {
            white-space: pre-wrap;
            font-family: "SF Mono", "Menlo", monospace;
            font-size: 15px;
            line-height: 1.5;
            color: #d1d1d6;
        }

        #loader {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%);
            background: var(--accent-blue); color: white;
            padding: 10px 20px; border-radius: 25px;
            font-size: 14px; font-weight: 600;
            display: none; box-shadow: 0 8px 20px rgba(10, 132, 255, 0.4);
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="ptr">↓ PULL TO REFRESH</div>

    <header>
        <h1>ATIS PRO</h1>
        <div class="status-bar"><span class="dot"></span> LIVE FLEET DATA</div>
    </header>

    <div class="container" id="airport-list"></div>
    <div id="loader">UPDATING...</div>

    <script>
        const airports = [
            "VHHH", "VTBD", "VTBS", "VVDN", "VVNB", 
            "RCKH", "RCTP", "RCMQ", 
            "RJAA", "RJBB", "RJFF", 
            "RKPC", "RKSI", 
            "WMKK", "WSSS", 
            "ZBAA", "ZBAD", "ZBTJ", "ZBYN", "ZGGG", "ZGKL", "ZGNN", "ZGOW", "ZGSZ", 
            "ZHCC", "ZHHH", "ZSAM", "ZSCG", "ZSFZ", "ZSHC", "ZSNB", "ZSOF", "ZSPD", 
            "ZSQD", "ZUCK", "ZUGY", "ZUUU", "ZUTF"
        ];
        
        function getTimeAgo(timeStr) {
            if (!timeStr) return "--";
            try {
                const parts = timeStr.match(/\d+/g);
                const updateDate = new Date(parts[0], parts[1]-1, parts[2], parts[3], parts[4], parts[5]);
                const diffMs = new Date() - updateDate;
                const diffMins = Math.floor(diffMs / 60000);

                if (diffMins < 1) return "Just now";
                if (diffMins < 60) return `${diffMins}m ago`;
                const hours = Math.floor(diffMins / 60);
                const mins = diffMins % 60;
                return mins === 0 ? `${hours}h ago` : `${hours}h ${mins}m ago`;
            } catch(e) { return "Error"; }
        }

        function createCards() {
            const list = document.getElementById('airport-list');
            list.innerHTML = '';
            airports.forEach(icao => {
                const card = document.createElement('div');
                card.className = 'airport-card';
                card.id = `card-${icao}`;
                card.innerHTML = `
                    <div class="card-header" onclick="this.parentElement.classList.toggle('expanded')">
                        <div class="icao-box">
                            <span class="icao-name">${icao}</span>
                            <span class="time-ago" id="time-${icao}">--</span>
                        </div>
                        <div class="chevron"></div>
                    </div>
                    <div class="card-content">
                        <div class="atis-text" id="atis-${icao}">Loading...</div>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        async function updateData() {
            document.getElementById('loader').style.display = 'block';
            for (const icao of airports) {
                try {
                    const res = await fetch(`atis_${icao}.txt?t=${new Date().getTime()}`);
                    if (!res.ok) throw new Error();
                    const text = await res.text();
                    const lines = text.split('\n');
                    
                    const timeLine = lines[1] ? lines[1].replace(/Update:|更新時間:/, '').trim() : "";
                    const content = lines.slice(4).join('\n').trim();

                    const timeAgoStr = getTimeAgo(timeLine);
                    const timeEl = document.getElementById(`time-${icao}`);
                    timeEl.innerText = timeAgoStr;
                    
                    if (timeAgoStr.includes('h')) timeEl.className = 'time-ago stale';
                    else timeEl.className = 'time-ago fresh';

                    document.getElementById(`atis-${icao}`).innerText = content || "No data available.";
                } catch (e) {
                    document.getElementById(`atis-${icao}`).innerText = "Pending data update...";
                }
            }
            setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 500);
        }

        let startY = 0;
        window.addEventListener('touchstart', e => { startY = e.touches[0].pageY; });
        window.addEventListener('touchmove', e => {
            const moveY = e.touches[0].pageY;
            if (window.scrollY === 0 && moveY > startY) {
                const dist = moveY - startY;
                if (dist < 100) document.getElementById('ptr').style.height = dist + 'px';
            }
        });
        window.addEventListener('touchend', () => {
            if (parseInt(document.getElementById('ptr').style.height) > 60) updateData();
            document.getElementById('ptr').style.height = '0px';
        });

        createCards();
        updateData();
        setInterval(updateData, 300000);
    </script>
</body>
</html>
