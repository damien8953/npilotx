<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATIS MONITOR PRO</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #1c1c1e;
            --accent-blue: #0a84ff;
            --accent-green: #32d74b;
            --accent-orange: #ff9f0a;
            --text-main: #ffffff;
            --text-dim: #8e8e93;
            --border-color: #38383a;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        header {
            padding: 55px 20px 15px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(25px);
            position: sticky; top: 0; z-index: 100;
            border-bottom: 0.5px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: flex-start;
        }

        /* 秘密觸發器綁定在標題上 */
        .header-left h1 { 
            margin: 0; font-size: 26px; font-weight: 800; letter-spacing: -0.5px; 
            user-select: none; /* 防止連點時選取文字 */
        }
        
        .server-update-box { margin-top: 6px; }
        .server-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
        .server-time { font-size: 12px; color: #d1d1d6; margin-top: 2px; font-family: "SF Mono", monospace; }
        
        .header-right { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
        
        .clocks { margin-bottom: 2px; }
        .clock-item { font-family: "SF Mono", monospace; font-size: 12px; font-weight: 600; line-height: 1.4; }
        .clock-hkt { color: var(--accent-blue); }
        .clock-utc { color: var(--accent-orange); }

        #update-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 0.5px solid var(--border-color);
            color: var(--accent-blue);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
        }
        #update-btn:active { background: var(--accent-blue); color: white; transform: scale(0.95); }

        .container { padding: 10px 15px; padding-bottom: 100px; }

        .category-header {
            margin: 24px 0 12px 5px; font-size: 12px; font-weight: 700;
            color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.2px;
            display: flex; align-items: center;
        }
        .category-header::after { content: ""; flex: 1; height: 0.5px; background: var(--border-color); margin-left: 10px; }

        .airport-card {
            background: var(--card-bg); border-radius: 14px; margin-bottom: 10px;
            overflow: hidden; border: 0.5px solid var(--border-color);
        }

        .card-header { padding: 16px 18px; display: flex; justify-content: space-between; align-items: center; }
        .icao-box { display: flex; flex-direction: column; gap: 3px; }
        .icao-name { font-size: 21px; font-weight: 700; color: var(--text-main); }
        
        .atis-zulu-tag { font-family: "SF Mono", monospace; font-size: 12px; color: var(--accent-green); font-weight: 600; }
        .atis-age-span { font-weight: 400; font-size: 11px; }
        .atis-age-span.warning { color: var(--accent-orange); }

        .chevron {
            width: 10px; height: 10px; border-right: 2.5px solid var(--text-dim);
            border-bottom: 2.5px solid var(--text-dim); transform: rotate(45deg);
        }

        .card-content { max-height: 0; padding: 0 18px; opacity: 0; overflow: hidden; transition: all 0.3s ease; background: #2c2c2e; }
        .expanded .card-content { max-height: 1500px; padding: 18px; opacity: 1; border-top: 0.5px solid var(--border-color); }
        .expanded .chevron { transform: rotate(-135deg); border-color: var(--accent-blue); }

        .atis-text { white-space: pre-wrap; font-family: "SF Mono", "Menlo", monospace; font-size: 14px; line-height: 1.5; color: #d1d1d6; }

        #loader { 
            position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); 
            background: var(--accent-blue); color: white; padding: 10px 22px; 
            border-radius: 25px; font-size: 13px; font-weight: 700; 
            display: none; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <h1 onclick="handleSecretClick()">ATIS PRO</h1>
            <div class="server-update-box">
                <div class="server-label">Last Server Update:</div>
                <div class="server-time" id="global-server-update">YYYY/MM/DD HH:MM HKT</div>
            </div>
        </div>
        <div class="header-right">
            <div class="clocks">
                <div class="clock-item clock-hkt">HKT <span id="time-hkt">--:--</span></div>
                <div class="clock-item clock-utc">UTC <span id="time-utc">--:--</span></div>
            </div>
            <button id="update-btn" onclick="refreshData()">Sync Data</button>
        </div>
    </header>

    <div class="container" id="airport-list"></div>
    <div id="loader">SYNCING DATA...</div>

    <script>
        const airportGroups = {
            "Home Base": ["VHHH"],
            "Taiwan": ["RCKH", "RCTP", "RCMQ"],
            "North East Asia": ["RJAA", "RJBB", "RJFF", "RKPC", "RKSI"],
            "South East Asia": ["VTBD", "VTBS", "VVDN", "VVNB", "WMKK", "WSSS"],
            "North China": ["ZBAA", "ZBAD", "ZBTJ", "ZBYN", "ZHCC", "ZHHH"],
            "East China": ["ZGGG", "ZGKL", "ZGNN", "ZGOW", "ZGSZ", "ZSAM", "ZSFZ", "ZSHC", "ZSNB", "ZSOF", "ZSPD", "ZSQD"],
            "West China": ["ZUCK", "ZUGY", "ZUUU", "ZUTF"]
        };

        const allAirports = Object.values(airportGroups).flat();

        // 秘密點擊偵測變數
        let clickCount = 0;
        let lastClickTime = 0;

        function updateClocks() {
            const now = new Date();
            const hkt = new Intl.DateTimeFormat('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false, timeZone: 'Asia/Hong_Kong' }).format(now);
            const utc = new Intl.DateTimeFormat('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false, timeZone: 'UTC' }).format(now);
            document.getElementById('time-hkt').innerText = hkt;
            document.getElementById('time-utc').innerText = utc;
        }
        setInterval(updateClocks, 1000);

        // 處理隱藏彩蛋：5次連點標題
        async function handleSecretClick() {
            const now = Date.now();
            if (now - lastClickTime > 1000) clickCount = 0;
            clickCount++;
            lastClickTime = now;

            if (clickCount === 5) {
                clickCount = 0;
                const token = prompt("Enter Admin Token to force Server Update:");
                if (token) triggerGitHubAction(token);
            }
        }

        // 遠端觸發 GitHub Action
        async function triggerGitHubAction(token) {
            const owner = "damien8953";
            const repo = "npilotx";
            const workflowId = "main.yml";

            const loader = document.getElementById('loader');
            loader.innerText = "COMMAND SENT TO SERVER...";
            loader.style.display = 'block';

            try {
                const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/actions/workflows/${workflowId}/dispatches`, {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/vnd.github+json',
                        'Authorization': `Bearer ${token}`,
                        'X-GitHub-Api-Version': '2022-11-28'
                    },
                    body: JSON.stringify({ ref: 'main' })
                });

                if (response.ok) {
                    alert("🚀 Server task started! Data will refresh in 2 mins.");
                } else {
                    const err = await response.json();
                    alert("❌ Failed: " + (err.message || "Auth Error"));
                }
            } catch (e) {
                alert("❌ Connection Error");
            } finally {
                loader.style.display = 'none';
                loader.innerText = "SYNCING DATA...";
            }
        }

        function getLatestZuluInfo(text) {
            const regex = /(\d{4})Z/g;
            let matches = text.match(regex);
            if (!matches) return { zulu: "--", diffText: "", isWarning: false };
            const now = new Date();
            let bestZulu = "", minDiff = Infinity, finalDiffText = "", finalWarning = false;
            matches.forEach(match => {
                const zuluStr = match.replace('Z', '');
                const hours = parseInt(zuluStr.substring(0, 2)), mins = parseInt(zuluStr.substring(2, 4));
                let atisDate = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate(), hours, mins));
                if (atisDate > now) atisDate.setUTCDate(atisDate.getUTCDate() - 1);
                const diffMins = Math.floor((now - atisDate) / 60000);
                if (diffMins < minDiff) {
                    minDiff = diffMins; bestZulu = match;
                    if (diffMins < 60) finalDiffText = ` (${diffMins}m ago)`;
                    else finalDiffText = ` (${Math.floor(diffMins/60)}h ${diffMins%60}m ago)`;
                    finalWarning = diffMins > 120;
                }
            });
            return { zulu: bestZulu, diffText: finalDiffText, isWarning: finalWarning };
        }

        function formatUpdateDate(timeStr) {
            if (!timeStr) return "--";
            try {
                const parts = timeStr.match(/\d+/g);
                return `${parts[0]}/${parts[1]}/${parts[2]} ${parts[3]}:${parts[4]} HKT`;
            } catch(e) { return timeStr; }
        }

        function renderUI() {
            const list = document.getElementById('airport-list');
            list.innerHTML = '';
            for (const [groupName, icaoList] of Object.entries(airportGroups)) {
                const title = document.createElement('div');
                title.className = 'category-header'; title.innerText = groupName;
                list.appendChild(title);
                icaoList.forEach(icao => {
                    const card = document.createElement('div');
                    card.className = 'airport-card';
                    card.id = `card-${icao}`;
                    card.innerHTML = `
                        <div class="card-header" onclick="this.parentElement.classList.toggle('expanded')">
                            <div class="icao-box">
                                <span class="icao-name">${icao}</span>
                                <span class="atis-zulu-tag">LAST ATIS: <span id="zulu-time-${icao}">--</span><span id="zulu-age-${icao}" class="atis-age-span"></span></span>
                            </div>
                            <div class="chevron"></div>
                        </div>
                        <div class="card-content"><div class="atis-text" id="atis-${icao}">Syncing...</div></div>
                    `;
                    list.appendChild(card);
                });
            }
        }

        async function refreshData() {
            const btn = document.getElementById('update-btn');
            btn.innerText = "Syncing...";
            document.getElementById('loader').style.display = 'block';
            try {
                const response = await fetch(`all_atis.json?t=${new Date().getTime()}`);
                if (!response.ok) throw new Error("JSON Error");
                const allData = await response.json();
                let firstUpdateFound = false;
                for (const icao of allAirports) {
                    const text = allData[icao];
                    if (!text) continue;
                    const lines = text.split('\n');
                    const timeLine = lines[1] ? lines[1].replace(/Update:|更新時間:/, '').trim() : "";
                    const content = lines.slice(4).join('\n').trim();
                    if (!firstUpdateFound && timeLine) {
                        document.getElementById('global-server-update').innerText = formatUpdateDate(timeLine);
                        firstUpdateFound = true;
                    }
                    const atisInfo = getLatestZuluInfo(content);
                    document.getElementById(`zulu-time-${icao}`).innerText = atisInfo.zulu;
                    const ageEl = document.getElementById(`zulu-age-${icao}`);
                    ageEl.innerText = atisInfo.diffText;
                    ageEl.className = 'atis-age-span' + (atisInfo.isWarning ? ' warning' : '');
                    document.getElementById(`atis-${icao}`).innerText = content || "No current ATIS.";
                }
            } catch (e) { console.error(e); }
            setTimeout(() => { 
                document.getElementById('loader').style.display = 'none';
                btn.innerText = "Sync Data";
            }, 600);
        }

        renderUI(); updateClocks(); refreshData();
        setInterval(refreshData, 300000);
    </script>
</body>
</html>
