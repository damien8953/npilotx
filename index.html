<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>ATIS MONITOR PRO</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #1c1c1e;
            --accent-color: #0a84ff;
            --text-main: #ffffff;
            --text-dim: #8e8e93;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-user-select: none;
        }

        /* Pull to Refresh Indicator */
        #ptr {
            text-align: center; height: 0; overflow: hidden;
            transition: height 0.2s; color: var(--text-dim);
            font-size: 12px; line-height: 50px;
        }

        header {
            padding: 50px 20px 10px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 100;
        }

        h1 { margin: 0; font-size: 28px; font-weight: 700; }
        .subtitle { color: var(--text-dim); font-size: 14px; margin-top: 4px; }

        .container { padding: 15px; }

        /* Airport Card */
        .airport-card {
            background: var(--card-bg);
            border-radius: 12px;
            margin-bottom: 15px;
            padding: 15px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
            overflow: hidden;
        }

        .airport-card:active { transform: scale(0.98); }

        /* Zoom Effect */
        .airport-card.zoomed {
            position: fixed; top: 10%; left: 5%; width: 90%; 
            max-height: 80%; z-index: 1000;
            transform: scale(1.05);
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            overflow-y: auto;
        }

        .overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.7);
            z-index: 900;
        }

        .icao { font-size: 20px; font-weight: 600; color: var(--accent-color); margin-bottom: 5px; }
        .update-time { font-size: 11px; color: var(--text-dim); margin-bottom: 10px; }
        .atis-content { 
            white-space: pre-wrap; font-family: "Courier New", monospace;
            font-size: 15px; line-height: 1.4; color: #e5e5ea;
        }

        #refresh-status {
            position: fixed; bottom: 20px; right: 20px;
            background: var(--accent-color); color: white;
            padding: 8px 15px; border-radius: 20px; font-size: 12px;
            display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div id="ptr">Pull down to refresh...</div>
    <div id="overlay" class="overlay"></div>

    <header>
        <h1>ATIS PRO</h1>
        <div class="subtitle" id="global-status">All Systems Operational</div>
    </header>

    <div class="container" id="airport-list">
        </div>

    <div id="refresh-status">Updating...</div>

    <script>
        const airports = ["VHHH", "ZSAM", "RCKH", "RCTP", "WSSS"];
        
        // Step 1: Generate UI
        const listContainer = document.getElementById('airport-list');
        const overlay = document.getElementById('overlay');

        function initUI() {
            listContainer.innerHTML = '';
            airports.forEach(icao => {
                const card = document.createElement('div');
                card.className = 'airport-card';
                card.id = `card-${icao}`;
                card.onclick = () => toggleZoom(card);
                card.innerHTML = `
                    <div class="icao">${icao}</div>
                    <div class="update-time" id="time-${icao}">Loading...</div>
                    <div class="atis-content" id="atis-${icao}">Fetching data...</div>
                `;
                listContainer.appendChild(card);
            });
        }

        // Step 2: Fetch Data
        async function fetchAtis() {
            document.getElementById('refresh-status').style.display = 'block';
            for (const icao of airports) {
                try {
                    // Force prevent caching by adding timestamp
                    const response = await fetch(`atis_${icao}.txt?t=${new Date().getTime()}`);
                    const text = await response.text();
                    
                    const lines = text.split('\n');
                    const timeLine = lines[1] || "";
                    const content = lines.slice(4).join('\n');

                    document.getElementById(`time-${icao}`).innerText = timeLine;
                    document.getElementById(`atis-${icao}`).innerText = content || "No current ATIS data.";
                } catch (e) {
                    document.getElementById(`atis-${icao}`).innerText = "Failed to load data.";
                }
            }
            document.getElementById('refresh-status').style.display = 'none';
        }

        // Step 3: Zoom Function
        function toggleZoom(card) {
            if (card.classList.contains('zoomed')) {
                card.classList.remove('zoomed');
                overlay.style.display = 'none';
            } else {
                document.querySelectorAll('.airport-card').forEach(c => c.classList.remove('zoomed'));
                card.classList.add('zoomed');
                overlay.style.display = 'block';
            }
        }

        overlay.onclick = () => {
            document.querySelectorAll('.airport-card').forEach(c => c.classList.remove('zoomed'));
            overlay.style.display = 'none';
        };

        // Step 4: Pull to Refresh Logic
        let touchStart = 0;
        window.addEventListener('touchstart', e => { touchStart = e.touches[0].pageY; });
        window.addEventListener('touchmove', e => {
            const touchMove = e.touches[0].pageY;
            if (window.scrollY === 0 && touchMove > touchStart) {
                const distance = touchMove - touchStart;
                if (distance < 80) document.getElementById('ptr').style.height = distance + 'px';
            }
        });
        window.addEventListener('touchend', () => {
            if (parseInt(document.getElementById('ptr').style.height) > 50) {
                fetchAtis();
            }
            document.getElementById('ptr').style.height = '0px';
        });

        initUI();
        fetchAtis();
        // Auto refresh every 5 minutes
        setInterval(fetchAtis, 300000);
    </script>
</body>
</html>
